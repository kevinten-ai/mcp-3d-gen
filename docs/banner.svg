<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#1a0a3e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2fff"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g opacity="0.08" stroke="#00d4ff">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>
  <!-- 3D Cube wireframe - left -->
  <g transform="translate(180,160)" opacity="0.6">
    <polygon points="0,0 60,-30 120,0 60,30" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <polygon points="0,0 0,70 60,100 60,30" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <polygon points="60,30 60,100 120,70 120,0" fill="none" stroke="#00d4ff" stroke-width="1.5"/>
    <polygon points="0,70 60,100 120,70 60,40" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- 3D Sphere wireframe - right -->
  <g transform="translate(900,130)" opacity="0.5">
    <circle cx="50" cy="50" r="50" fill="none" stroke="#7b2fff" stroke-width="1.5"/>
    <ellipse cx="50" cy="50" rx="50" ry="18" fill="none" stroke="#7b2fff" stroke-width="0.8"/>
    <ellipse cx="50" cy="50" rx="50" ry="35" fill="none" stroke="#7b2fff" stroke-width="0.5" transform="rotate(30,50,50)"/>
    <ellipse cx="50" cy="50" rx="50" ry="35" fill="none" stroke="#7b2fff" stroke-width="0.5" transform="rotate(-30,50,50)"/>
    <ellipse cx="50" cy="50" rx="18" ry="50" fill="none" stroke="#7b2fff" stroke-width="0.8"/>
  </g>
  <!-- 3D Pyramid wireframe - far left -->
  <g transform="translate(60,200)" opacity="0.35">
    <polygon points="40,0 0,60 80,60" fill="none" stroke="#00d4ff" stroke-width="1"/>
    <line x1="40" y1="0" x2="55" y2="55" stroke="#00d4ff" stroke-width="0.8"/>
    <polygon points="0,60 80,60 55,55" fill="none" stroke="#00d4ff" stroke-width="0.5"/>
  </g>
  <!-- 3D Diamond - far right -->
  <g transform="translate(1060,170)" opacity="0.4">
    <polygon points="35,0 70,40 35,80 0,40" fill="none" stroke="#7b2fff" stroke-width="1.2"/>
    <line x1="35" y1="0" x2="35" y2="80" stroke="#7b2fff" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="70" y2="40" stroke="#7b2fff" stroke-width="0.5"/>
  </g>
  <!-- Glow particles -->
  <circle cx="300" cy="100" r="2" fill="#00d4ff" opacity="0.6"/>
  <circle cx="500" cy="300" r="1.5" fill="#7b2fff" opacity="0.5"/>
  <circle cx="750" cy="80" r="2" fill="#00d4ff" opacity="0.4"/>
  <circle cx="850" cy="320" r="1.5" fill="#7b2fff" opacity="0.6"/>
  <circle cx="150" cy="320" r="1" fill="#00d4ff" opacity="0.5"/>
  <circle cx="1050" cy="100" r="1.5" fill="#00d4ff" opacity="0.3"/>
  <circle cx="650" cy="350" r="2" fill="#7b2fff" opacity="0.4"/>
  <!-- Title -->
  <text x="600" y="170" text-anchor="middle" fill="url(#glow)" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="bold" letter-spacing="4">mcp-3d-gen</text>
  <!-- Subtitle -->
  <text x="600" y="220" text-anchor="middle" fill="#8899bb" font-family="'Segoe UI',Arial,sans-serif" font-size="20" letter-spacing="2">Multi-Provider AI 3D Model Generation</text>
  <!-- Provider tags -->
  <g transform="translate(340,260)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <text x="60" y="21" text-anchor="middle" fill="#00d4ff" font-family="Arial,sans-serif" font-size="13" opacity="0.8">Tripo3D</text>
  </g>
  <g transform="translate(490,260)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="none" stroke="#7b2fff" stroke-width="1" opacity="0.6"/>
    <text x="60" y="21" text-anchor="middle" fill="#7b2fff" font-family="Arial,sans-serif" font-size="13" opacity="0.8">Hyper3D</text>
  </g>
  <g transform="translate(640,260)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="none" stroke="#ff6b35" stroke-width="1" opacity="0.6"/>
    <text x="60" y="21" text-anchor="middle" fill="#ff6b35" font-family="Arial,sans-serif" font-size="13" opacity="0.8">Meshy</text>
  </g>
  <!-- Decorative line -->
  <line x1="350" y1="240" x2="750" y2="240" stroke="url(#glow)" stroke-width="1" opacity="0.3"/>
</svg>
